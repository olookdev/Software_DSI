{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSI - Management System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { 
          display: flex;
          flex-direction: column; 
          min-height: 100vh;
          background-color: #f8f9fa; 
          overflow-x: hidden; 
          font-family: 'Poppins', sans-serif; 
          margin: 0;
        }

        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5) !important;
        }
        
        .navbar { 
          background: white; 
          border-bottom: 1px solid #ddd; 
          height: 70px; 
          padding: 0 20px; 
          display: flex;
          justify-content: space-between; 
          align-items: center;
          width: 100%;
          box-sizing: border-box;
          position: sticky;
          top: 0;
          z-index: 1050;
        }

        .logo-header { 
          height: 40px; 
          width: auto; 
        }

        .btn-logout { 
          background: #FFE5E5; color: #D9534F; border: 1px solid #FFC1C1; 
          border-radius: 8px; padding: 5px 20px; font-weight: 600; text-decoration: none;
          font-size: 14px;
        }

        .page-header {
          background: transparent;
          padding: 15px 30px;
          display: flex;
          align-items: center;
          font-size: 20px;
        }

        .btn-toggle-menu {
          font-size: 2rem;
          color: #1A6B8D;
          cursor: pointer;
          border: none;
          background: none;
          padding: 0;
          margin-right: 20px;
          display: flex;
          align-items: center;
        }

        #sidebar {
          width: 300px; 
          height: calc(100vh - 70px); 
          background: white; 
          position: fixed;
          left: -350px; 
          top: 70px; 
          z-index: 2000; 
          transition: 0.4s ease;
          border-radius: 0 40px 40px 0; 
          border-right: 1px solid #ddd; 
          padding: 25px;
          box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }

        #sidebar.active { 
          left: 0; 
        }
        
        .sidebar-header { 
          display: flex; 
          justify-content: 
          flex-end; 
          margin-bottom: 20px; 
        }

        .btn-close-sidebar { 
            border: none; 
            background: #FF0000; 
            color: white; 
            border-radius: 50%; 
            width: 30px; 
            height: 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .sidebar-link { 
            display: block; 
            padding: 12px 15px; 
            color: #555; 
            text-decoration: none; 
            border-radius: 12px; 
            margin-bottom: 5px; 
            transition: 0.3s; 
        }

        .sidebar-link:hover, .sidebar-link.active { 
          background: #E3F2FD; 
          color: #1A6B8D; 
          font-weight: 600; 
        }

        .overlay { 
            position: fixed; 
            top: 70px; 
            left: 0; 
            width: 100%; 
            height: calc(100vh - 70px); 
            background: rgba(0,0,0,0.3); 
            z-index: 1500; 
            display: none; 
        }
        
        .overlay.active { 
          display: block; 
        }

        #main-content { 
          flex: 1;
          padding: 0 30px 40px 30px; 
        }

        footer { 
          flex-shrink: 0; 
          padding: 20px; 
          text-align: center; 
          color: #aaa; 
          font-size: 13px; 
          background: white; 
          border-top: 1px solid #eee; 
        }
    </style>
</head>
<body>
    <nav class="navbar">
            <div class="d-flex align-items-center">
                <img src="{% static 'images/logo_kecil.png' %}" class="logo-header" alt="DSI Logo">
            </div>
            
            <div class="pe-2"> 
                <a href="{% url 'login' %}" class="btn btn-logout d-flex align-items-center">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </a>
            </div>
        </nav>

    <div class="page-header">
        <button class="btn-toggle-menu" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>
        <h2 class="m-0 fw-bold">{% block page_title %}{% endblock page_title %}</h2>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <nav id="sidebar">
        <div class="sidebar-header">
            <button class="btn-close-sidebar" onclick="toggleSidebar()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="sidebar-menu">
            <a href="{% url 'home' %}" class="sidebar-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                Home
            </a>
            <a href="{% url 'list_order' %}" class="sidebar-link {% if request.resolver_match.url_name == 'list_order' %}active{% endif %}">
                Order
            </a>
            <a href="{% url 'list_stok' %}" class="sidebar-link {% if request.resolver_match.url_name == 'list_stok' %}active{% endif %}">
                Stok
            </a>
            <a href="{% url 'data_customer' %}" class="sidebar-link {% if request.resolver_match.url_name == 'data_customer' %}active{% endif %}">
                Data Customer
            </a>
            <a href="{% url 'data_suplier' %}" class="sidebar-link {% if request.resolver_match.url_name == 'data_suplier' %}active{% endif %}">
                Data Suplier
            </a>            
            <a href="{% url 'daftar_harga' %}" class="sidebar-link {% if request.resolver_match.url_name == 'daftar_harga' %}active{% endif %}">
                Daftar Harga
            </a>
            <a href="{% url 'hutang' %}" class="sidebar-link {% if request.resolver_match.url_name == 'hutang' %}active{% endif %}">
                Hutang
            </a>
            <a href="{% url 'piutang' %}" class="sidebar-link {% if request.resolver_match.url_name == 'piutang' %}active{% endif %}">
                Piutang
            </a>
            <a href="{% url 'transaksi' %}" class="sidebar-link {% if request.resolver_match.url_name == 'transaksi' %}active{% endif %}">Transaksi</a>
            <a href="{% url 'pengiriman' %}" class="sidebar-link {% if request.resolver_match.url_name == 'pengiriman' %}active{% endif %}">Pengiriman</a>
            <div style="margin-top: 50px;">
                <hr>
                <a href="#" class="sidebar-link text-muted">Export To Excel</a>
            </div>
        </div>
    </nav>

    <div id="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        &copy; 2026 Digital Studio Indonesia. All Rights Reserved.
    </footer>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');            
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        
</body>
</html>
