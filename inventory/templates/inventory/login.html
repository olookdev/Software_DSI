{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Studio Indonesia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; }
        .login-container { display: flex; height: 100vh; }
        
        .login-left {
            flex: 1.2;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .logo-circle img {
            width: 800px; 
            height: auto;
            /* text-align: center; */
            margin-left: 10px;
        }

        .login-right {
            flex: 1;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 100%;
            height: 400px;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0px 0px 50px 20px rgba(0,0,0,0.1); 
            background: #ffffff;
        }

        .login-title {
            font-weight: 700;
            font-size: 3rem;
            margin-bottom: 40px;
            margin-top: 10px;
            color: #333;
            text-align: center;
        }

        .form-label {
            font-weight: 500;
        }

        .spacer-input {
            margin-bottom: 40px; 
        }

        .btn-masuk {
            background-color: #1A6B8D;
            color: white;
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-masuk:hover {
            background-color: #145570;
        }

        input {
            width: 100%;
            height: 35px;
            color: #333333;
            background-color: #ffffff !important; 
            border: 1px solid #C4C4C4;
            margin-top: 10px;
            box-shadow: none !important; 
        }
        
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-left">
        <div class="logo-circle">
            <img src="{% static 'images/logo.png' %}" alt="Logo DSI">
        </div>
    </div>

    <div class="login-right">
        <div class="login-box">
            <h2 class="login-title"> <b>Login</b></h2>
            <form method="POST">
                {% csrf_token %}
                <div class="spacer-input text-start">
                    <label class="form-label">Username</label>
                    <br>
                    <input type="text" name="username" class="form-control form-control-lg" required>
                </div>
                
                <div class="spacer-input text-start">
                    <label class="form-label">Password</label>
                    <br>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>

                <button type="submit" class="btn btn-masuk">Masuk</button>
            </form>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger mt-4 py-2 small text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
